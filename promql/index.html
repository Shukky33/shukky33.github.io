<!DOCTYPE html>
<!-- PromQL Builder — aucune donnée personnelle stockée -->
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromQL Builder — Portail</title>
  <style>
/* Portail Personnel — Charte graphique — aucune donnée personnelle */
:root{--bg-base:#0d1117;--bg-card:#161b22;--bg-card-hover:#1c2330;--bg-input:#21262d;--border:#30363d;--border-focus:#58a6ff;--accent:#58a6ff;--accent-dim:#1f6feb;--accent2:#39d0d8;--text-primary:#e6edf3;--text-secondary:#8b949e;--text-muted:#484f58;--success:#3fb950;--warning:#d29922;--danger:#f85149;--radius-sm:6px;--radius-md:10px;--radius-lg:16px;--shadow-card:0 4px 24px rgba(0,0,0,.4);--shadow-btn:0 2px 8px rgba(88,166,255,.15);--font:'Segoe UI',system-ui,-apple-system,sans-serif;--font-mono:'Cascadia Code','Consolas',monospace;--transition:160ms ease}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:var(--font);font-size:15px;line-height:1.6;color:var(--text-primary);background:var(--bg-base);min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}img,svg{display:block;max-width:100%}
h1{font-size:2rem;font-weight:700;letter-spacing:-.5px}h2{font-size:1.35rem;font-weight:600}h3{font-size:1.1rem;font-weight:600}p{color:var(--text-secondary)}
code,pre{font-family:var(--font-mono);font-size:.875em;background:var(--bg-input);border-radius:var(--radius-sm)}code{padding:.15em .4em}pre{padding:1rem;overflow-x:auto;border:1px solid var(--border)}
.container{width:100%;max-width:1100px;margin-inline:auto;padding-inline:1.5rem}
.btn{display:inline-flex;align-items:center;gap:.45rem;padding:.5rem 1.1rem;border:1px solid transparent;border-radius:var(--radius-sm);font-family:var(--font);font-size:.875rem;font-weight:500;cursor:pointer;transition:background var(--transition),border-color var(--transition),box-shadow var(--transition),opacity var(--transition);white-space:nowrap;text-decoration:none!important}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn--primary{background:var(--accent-dim);border-color:var(--accent-dim);color:#fff;box-shadow:var(--shadow-btn)}.btn--primary:hover{background:var(--accent);border-color:var(--accent)}
.btn--secondary{background:transparent;border-color:var(--border);color:var(--text-primary)}.btn--secondary:hover{background:var(--bg-input);border-color:var(--accent)}
.btn--ghost{background:transparent;border-color:transparent;color:var(--text-secondary)}.btn--ghost:hover{color:var(--text-primary);background:var(--bg-input)}
.btn--sm{padding:.35rem .75rem;font-size:.8rem}.btn--lg{padding:.7rem 1.5rem;font-size:1rem}.btn:disabled{opacity:.45;cursor:not-allowed}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.5rem;box-shadow:var(--shadow-card);transition:border-color var(--transition),background var(--transition)}
.card:hover{border-color:var(--accent);background:var(--bg-card-hover)}
.badge{display:inline-block;padding:.15em .55em;border-radius:999px;font-size:.72rem;font-weight:600;letter-spacing:.02em}
.badge--version{background:var(--bg-input);color:var(--accent);border:1px solid var(--border)}.badge--new{background:#1a3a2a;color:var(--success)}.badge--beta{background:#2d2009;color:var(--warning)}
.input,.select,.textarea{width:100%;padding:.55rem .85rem;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:.9rem;transition:border-color var(--transition),box-shadow var(--transition)}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(88,166,255,.15)}
.input::placeholder,.textarea::placeholder{color:var(--text-muted)}
label{font-size:.875rem;color:var(--text-secondary);display:block;margin-bottom:.35rem}
.divider{height:1px;background:var(--border);margin-block:1.5rem}
.text-accent{color:var(--accent)}.text-muted{color:var(--text-muted)}.text-secondary{color:var(--text-secondary)}.text-success{color:var(--success)}.text-danger{color:var(--danger)}.text-center{text-align:center}
.mt-sm{margin-top:.5rem}.mt-md{margin-top:1rem}.mt-lg{margin-top:2rem}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:var(--bg-base)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
::selection{background:rgba(88,166,255,.3)}
  </style>
  <style>
    .tool-header{display:flex;align-items:center;gap:1rem;padding:1.5rem 0;border-bottom:1px solid var(--border);margin-bottom:2rem;}
    .tool-header h1{font-size:1.5rem;flex:1;}
    .layout{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
    @media(max-width:800px){.layout{grid-template-columns:1fr;}}
    .section-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-secondary);margin-bottom:.6rem;}
    .kv-list{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.5rem;}
    .kv-row{display:flex;gap:.4rem;align-items:center;}
    .kv-row input{flex:1;}
    .kv-row select{flex:0 0 70px;}
    .output-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;}
    .output-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid var(--border);background:var(--bg-input);}
    .output-header span{font-size:.75rem;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
    .output-pre{font-family:var(--font-mono);font-size:.9rem;padding:1rem;white-space:pre-wrap;word-break:break-all;min-height:80px;color:var(--accent);}
    .presets{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem;}
    .func-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-top:.5rem;}
    .func-card{padding:.5rem .75rem;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);}
    .func-card:hover{border-color:var(--accent);}
    .func-card strong{display:block;font-family:var(--font-mono);font-size:.8rem;color:var(--accent2);}
    .func-card span{font-size:.75rem;color:var(--text-muted);}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
  </style>
</head>
<body>
<div class="container">
  <header class="tool-header">
    <a href="../" class="btn btn--ghost btn--sm">← Retour</a>
    <h1>PromQL Builder</h1>
    <span class="badge badge--version">v1.0.0</span>
  </header>

  <p class="section-title">Modèles courants</p>
  <div class="presets" id="presets"></div>

  <div class="layout">
    <!-- Gauche : builder -->
    <div style="display:flex;flex-direction:column;gap:1.25rem;">

      <div class="card">
        <p class="section-title">Métrique</p>
        <input class="input" id="metric" placeholder="http_requests_total" oninput="build()">
      </div>

      <div class="card">
        <p class="section-title">Filtres de labels</p>
        <div class="kv-list" id="labels"></div>
        <button class="btn btn--secondary btn--sm" onclick="addLabel()">+ Label</button>
      </div>

      <div class="card">
        <p class="section-title">Fonction + plage temporelle</p>
        <div class="two-col">
          <div>
            <label>Fonction</label>
            <select class="select" id="fn" onchange="onFnChange()">
              <option value="">— Aucune —</option>
              <option value="rate">rate()</option>
              <option value="irate">irate()</option>
              <option value="increase">increase()</option>
              <option value="delta">delta()</option>
              <option value="avg_over_time">avg_over_time()</option>
              <option value="sum_over_time">sum_over_time()</option>
              <option value="max_over_time">max_over_time()</option>
              <option value="min_over_time">min_over_time()</option>
            </select>
          </div>
          <div id="range-div">
            <label>Plage (range vector)</label>
            <select class="select" id="range">
              <option value="1m">1m</option>
              <option value="5m" selected>5m</option>
              <option value="15m">15m</option>
              <option value="1h">1h</option>
              <option value="6h">6h</option>
              <option value="24h">24h</option>
              <option value="custom">Personnalisé</option>
            </select>
            <input class="input" id="range-custom" placeholder="ex: 30m" style="display:none;margin-top:.4rem" oninput="build()">
          </div>
        </div>
      </div>

      <div class="card">
        <p class="section-title">Agrégation</p>
        <div class="two-col">
          <div>
            <label>Opérateur</label>
            <select class="select" id="agg-op" onchange="build()">
              <option value="">— Aucun —</option>
              <option value="sum">sum</option>
              <option value="avg">avg</option>
              <option value="max">max</option>
              <option value="min">min</option>
              <option value="count">count</option>
              <option value="stddev">stddev</option>
              <option value="topk">topk</option>
              <option value="bottomk">bottomk</option>
            </select>
          </div>
          <div>
            <label>By / Without</label>
            <select class="select" id="agg-by" onchange="build()">
              <option value="">—</option>
              <option value="by">by ()</option>
              <option value="without">without ()</option>
            </select>
            <input class="input" id="agg-labels" placeholder="job, instance" style="margin-top:.4rem" oninput="build()">
          </div>
        </div>
        <div id="topk-val" style="display:none;margin-top:.5rem">
          <label>k (valeur)</label>
          <input class="input" id="topk-n" type="number" value="5" min="1" oninput="build()">
        </div>
      </div>

      <div class="card">
        <p class="section-title">Opération arithmétique (optionnel)</p>
        <div class="two-col">
          <div>
            <label>Opérateur</label>
            <select class="select" id="arith-op" onchange="build()">
              <option value="">— Aucun —</option>
              <option value="*">× Multiplier</option>
              <option value="/">÷ Diviser</option>
              <option value="+">+ Additionner</option>
              <option value="-">− Soustraire</option>
            </select>
          </div>
          <div>
            <label>Valeur</label>
            <input class="input" id="arith-val" type="number" placeholder="100" oninput="build()">
          </div>
        </div>
      </div>
    </div>

    <!-- Droite : output + ref -->
    <div>
      <p class="section-title">Requête générée</p>
      <div class="output-box" style="margin-bottom:1.25rem;">
        <div class="output-header">
          <span>PromQL</span>
          <button class="btn btn--sm btn--secondary" onclick="copyQuery()">Copier</button>
        </div>
        <pre class="output-pre" id="output"></pre>
      </div>

      <p class="section-title">Fonctions disponibles</p>
      <div class="func-grid" id="func-ref"></div>
    </div>
  </div>
</div>
<script>
const PRESETS=[
  {l:'Taux de requêtes HTTP',      f:()=>{setMetric('http_requests_total'); setFn('rate','5m'); setAgg('sum','by','job'); build();}},
  {l:'CPU usage (%)',               f:()=>{setMetric('node_cpu_seconds_total'); addLabelVal('mode','!=','idle'); setFn('rate','5m'); setAgg('avg','by','instance'); build();}},
  {l:'Mémoire libre (octets)',      f:()=>{setMetric('node_memory_MemFree_bytes'); build();}},
  {l:'Taux d\'erreurs HTTP 5xx',    f:()=>{setMetric('http_requests_total'); addLabelVal('status','=~','5..'); setFn('rate','5m'); setAgg('sum','by','service'); build();}},
  {l:'Latence P95',                 f:()=>{setMetric('http_request_duration_seconds'); build();}},
];

const FUNCS=[
  {n:'rate()',            d:'Taux par seconde sur range vector (compteurs)'},
  {n:'irate()',           d:'Taux instantané (2 derniers points)'},
  {n:'increase()',        d:'Augmentation absolue sur la plage'},
  {n:'delta()',           d:'Différence début/fin de plage (jauges)'},
  {n:'avg_over_time()',   d:'Moyenne sur la plage'},
  {n:'sum_over_time()',   d:'Somme sur la plage'},
  {n:'histogram_quantile()',d:'Quantile depuis histogram'},
  {n:'label_replace()',   d:'Renommer/créer un label dynamiquement'},
];

document.getElementById('func-ref').innerHTML=FUNCS.map(f=>`<div class="func-card"><strong>${f.n}</strong><span>${f.d}</span></div>`).join('');

document.getElementById('range').onchange=()=>{
  const v=document.getElementById('range').value;
  document.getElementById('range-custom').style.display=v==='custom'?'':'none';
  build();
};

document.getElementById('agg-op').onchange=()=>{
  const v=document.getElementById('agg-op').value;
  document.getElementById('topk-val').style.display=(v==='topk'||v==='bottomk')?'':'none';
  build();
};

function onFnChange(){
  const v=document.getElementById('fn').value;
  document.getElementById('range-div').style.opacity=v?'1':'.4';
  build();
}

function addLabel(k='',op='=',v=''){
  const list=document.getElementById('labels');
  const row=document.createElement('div'); row.className='kv-row';
  row.innerHTML=`<input class="input" placeholder="label" value="${k}" oninput="build()">
    <select class="select" onchange="build()">
      <option ${op==='='?'selected':''} value="=">=</option>
      <option ${op==='!='?'selected':''} value="!=">!=</option>
      <option ${op==='=~'?'selected':''} value="=~">=~</option>
      <option ${op==='!~'?'selected':''} value="!~">!~</option>
    </select>
    <input class="input" placeholder="valeur" value="${v}" oninput="build()">
    <button class="btn btn--ghost btn--sm" onclick="this.closest('.kv-row').remove();build()">✕</button>`;
  list.appendChild(row); build();
}

function addLabelVal(k,op,v){ document.getElementById('labels').innerHTML=''; addLabel(k,op,v); }

function setMetric(m){ document.getElementById('metric').value=m; build(); }
function setFn(fn,range){ document.getElementById('fn').value=fn; document.getElementById('range').value=range; build(); }
function setAgg(op,by,labels){ document.getElementById('agg-op').value=op; document.getElementById('agg-by').value=by; document.getElementById('agg-labels').value=labels; build(); }

function getRange(){
  const v=document.getElementById('range').value;
  return v==='custom'?document.getElementById('range-custom').value||'5m':v;
}

function build(){
  const metric=document.getElementById('metric').value||'my_metric';
  const fn=document.getElementById('fn').value;
  const range=getRange();
  const aggOp=document.getElementById('agg-op').value;
  const aggBy=document.getElementById('agg-by').value;
  const aggLabels=document.getElementById('agg-labels').value;
  const arithOp=document.getElementById('arith-op').value;
  const arithVal=document.getElementById('arith-val').value;

  // Labels
  const labelParts=[];
  document.querySelectorAll('#labels .kv-row').forEach(r=>{
    const[k,op,v]=[...r.querySelectorAll('input,select')].map(e=>e.value);
    if(k) labelParts.push(`${k}${op}"${v}"`);
  });
  const selector=labelParts.length?`{${labelParts.join(', ')}}':''}`;
  const base=`${metric}${labelParts.length?'{'+labelParts.join(', ')+'}':''}`;

  // Range vector
  let expr=fn?`${fn}(${base}[${range}])`:base;

  // Aggregation
  if(aggOp){
    const topkN=document.getElementById('topk-n')?.value||'5';
    const prefix=(aggOp==='topk'||aggOp==='bottomk')?`${aggOp}(${topkN}, `:` ${aggOp}(`;
    const byClause=aggBy&&aggLabels?` ${aggBy} (${aggLabels})`:'';
    if(aggOp==='topk'||aggOp==='bottomk') expr=`${aggOp}(${topkN}, ${expr})${byClause?` ${byClause}`:''}`;
    else expr=`${aggOp}${byClause}(${expr})`;
  }

  // Arithmetic
  if(arithOp&&arithVal) expr=`(${expr}) ${arithOp} ${arithVal}`;

  document.getElementById('output').textContent=expr;
}

function copyQuery(){
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  const b=event.target; b.textContent='Copié !'; b.classList.add('btn--primary');
  setTimeout(()=>{b.textContent='Copier';b.classList.remove('btn--primary');},1500);
}

// Presets
const pe=document.getElementById('presets');
PRESETS.forEach(p=>{ const b=document.createElement('button'); b.className='btn btn--secondary btn--sm'; b.textContent=p.l; b.onclick=()=>{ document.getElementById('labels').innerHTML=''; p.f(); }; pe.appendChild(b); });

build();
</script>
</body>
</html>
