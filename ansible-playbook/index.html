<!DOCTYPE html>
<!-- Ansible Playbook Builder RHEL 6/7/8/9 — aucune donnée personnelle stockée -->
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ansible Playbook Builder RHEL — Portail</title>
  <style>
/* Portail Personnel — Charte graphique — aucune donnée personnelle */
:root{--bg-base:#0d1117;--bg-card:#161b22;--bg-card-hover:#1c2330;--bg-input:#21262d;--border:#30363d;--border-focus:#58a6ff;--accent:#58a6ff;--accent-dim:#1f6feb;--accent2:#39d0d8;--text-primary:#e6edf3;--text-secondary:#8b949e;--text-muted:#484f58;--success:#3fb950;--warning:#d29922;--danger:#f85149;--radius-sm:6px;--radius-md:10px;--radius-lg:16px;--shadow-card:0 4px 24px rgba(0,0,0,.4);--shadow-btn:0 2px 8px rgba(88,166,255,.15);--font:'Segoe UI',system-ui,-apple-system,sans-serif;--font-mono:'Cascadia Code','Consolas',monospace;--transition:160ms ease}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);font-size:15px;line-height:1.6;color:var(--text-primary);background:var(--bg-base);min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
img,svg{display:block;max-width:100%}
h1{font-size:2rem;font-weight:700;letter-spacing:-.5px}h2{font-size:1.35rem;font-weight:600}h3{font-size:1.1rem;font-weight:600}
p{color:var(--text-secondary)}
code,pre{font-family:var(--font-mono);font-size:.875em;background:var(--bg-input);border-radius:var(--radius-sm)}code{padding:.15em .4em}pre{padding:1rem;overflow-x:auto;border:1px solid var(--border)}
.container{width:100%;max-width:1200px;margin-inline:auto;padding-inline:1.5rem}
.btn{display:inline-flex;align-items:center;gap:.45rem;padding:.5rem 1.1rem;border:1px solid transparent;border-radius:var(--radius-sm);font-family:var(--font);font-size:.875rem;font-weight:500;cursor:pointer;transition:background var(--transition),border-color var(--transition),box-shadow var(--transition),opacity var(--transition);white-space:nowrap;text-decoration:none!important}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn--primary{background:var(--accent-dim);border-color:var(--accent-dim);color:#fff;box-shadow:var(--shadow-btn)}.btn--primary:hover{background:var(--accent);border-color:var(--accent)}
.btn--secondary{background:transparent;border-color:var(--border);color:var(--text-primary)}.btn--secondary:hover{background:var(--bg-input);border-color:var(--accent)}
.btn--ghost{background:transparent;border-color:transparent;color:var(--text-secondary)}.btn--ghost:hover{color:var(--text-primary);background:var(--bg-input)}
.btn--sm{padding:.35rem .75rem;font-size:.8rem}.btn--lg{padding:.7rem 1.5rem;font-size:1rem}
.btn:disabled{opacity:.45;cursor:not-allowed}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.5rem;box-shadow:var(--shadow-card);transition:border-color var(--transition),background var(--transition)}
.card:hover{border-color:var(--accent);background:var(--bg-card-hover)}
.badge{display:inline-block;padding:.15em .55em;border-radius:999px;font-size:.72rem;font-weight:600;letter-spacing:.02em}
.badge--version{background:var(--bg-input);color:var(--accent);border:1px solid var(--border)}.badge--new{background:#1a3a2a;color:var(--success)}.badge--beta{background:#2d2009;color:var(--warning)}
.input,.select,.textarea{width:100%;padding:.55rem .85rem;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:.9rem;transition:border-color var(--transition),box-shadow var(--transition)}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(88,166,255,.15)}
.input::placeholder,.textarea::placeholder{color:var(--text-muted)}
label{font-size:.875rem;color:var(--text-secondary);display:block;margin-bottom:.35rem}
.divider{height:1px;background:var(--border);margin-block:1.5rem}
.text-accent{color:var(--accent)}.text-muted{color:var(--text-muted)}.text-secondary{color:var(--text-secondary)}.text-success{color:var(--success)}.text-danger{color:var(--danger)}.text-center{text-align:center}
.mt-sm{margin-top:.5rem}.mt-md{margin-top:1rem}.mt-lg{margin-top:2rem}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:var(--bg-base)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
::selection{background:rgba(88,166,255,.3)}

/* Tool styles */
.tool-header{display:flex;align-items:center;gap:1rem;padding:1.5rem 0;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.tool-header h1{font-size:1.5rem;flex:1}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.section-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-secondary);margin-bottom:.5rem}
.rhel-bar{display:flex;align-items:center;gap:.75rem;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-md);padding:.6rem 1rem;margin-bottom:1rem;flex-wrap:wrap}
.rhel-bar span{font-size:.8rem;color:var(--text-secondary)}
.rhel-btn{padding:.3rem .8rem;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:.82rem;font-weight:600;cursor:pointer;transition:all var(--transition)}
.rhel-btn.active{background:#cc0000;border-color:#cc0000;color:#fff}
.mode-bar{display:flex;gap:.5rem;margin-bottom:.75rem}
.mode-btn{padding:.35rem .9rem;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:.82rem;font-weight:600;cursor:pointer;transition:all var(--transition)}
.mode-btn.active-mod{background:var(--accent-dim);border-color:var(--accent-dim);color:#fff}
.mode-btn.active-cons{background:#1a3a2a;border-color:var(--success);color:var(--success)}
.recipe-cats{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem}
.cat-btn{padding:.25rem .65rem;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:.75rem;cursor:pointer;transition:all var(--transition)}
.cat-btn.active{background:var(--accent-dim);border-color:var(--accent);color:#fff}
.cat-btn.cons-active{background:#1a3a2a;border-color:var(--success);color:var(--success)}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.5rem;margin-bottom:1.5rem;max-height:260px;overflow-y:auto}
.recipe-card{padding:.5rem .75rem;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition)}
.recipe-card:hover{border-color:var(--accent);background:var(--bg-card-hover)}
.recipe-card.ro{border-left:3px solid var(--success)}
.recipe-card.ro:hover{border-color:var(--success)}
.recipe-card strong{display:block;font-size:.78rem;color:var(--text-primary);margin-bottom:.12rem}
.recipe-card span{font-size:.7rem;color:var(--text-muted)}
.task-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:.75rem;margin-bottom:.5rem}
.task-card.ro-task{border-left:3px solid var(--success)}
.task-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem}
.task-num{font-size:.68rem;font-weight:700;background:var(--accent-dim);color:#fff;border-radius:999px;padding:.1rem .4rem;flex-shrink:0}
.task-num.ro{background:#1a4a2a}
.task-title-input{flex:1}
.task-params{display:flex;flex-direction:column;gap:.3rem;margin-top:.4rem}
.kv-row{display:flex;gap:.4rem;align-items:center}
.kv-row input{flex:1}
.output-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden}
.output-header{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;border-bottom:1px solid var(--border);background:var(--bg-input)}
.output-header span{font-size:.75rem;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.output-pre{font-family:var(--font-mono);font-size:.76rem;padding:1rem;white-space:pre;overflow-x:auto;min-height:350px;color:var(--text-primary)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.check-label{display:flex;align-items:center;gap:.5rem;font-size:.82rem;cursor:pointer;color:var(--text-secondary)}
.check-label input{width:15px;height:15px;accent-color:var(--accent)}
.extras-row{display:flex;gap:.4rem;margin-top:.4rem;flex-wrap:wrap;align-items:center}
.extras-row input{flex:1;min-width:90px}
.ro-badge{font-size:.65rem;padding:.05rem .35rem;border-radius:999px;background:#1a3a2a;color:var(--success);border:1px solid var(--success);flex-shrink:0}
.mail-task{border-left:3px solid #3b82f6;background:rgba(59,130,246,.06)}
.mail-num{background:#1a2d4a!important;color:#3b82f6!important}
.recipe-card.mail-r{border-left:3px solid #3b82f6}
.recipe-card.csv-r{border-left:3px solid #d29922}
  </style>
</head>
<body>
<div class="container">
  <header class="tool-header">
    <a href="../" class="btn btn--ghost btn--sm">← Retour</a>
    <h1>Ansible Playbook Builder RHEL</h1>
    <span class="badge badge--version">v1.2.0</span>
  </header>

  <div class="rhel-bar">
    <span>Cible :</span>
    <button class="rhel-btn" data-v="6" onclick="setRhel(6,this)">RHEL 6</button>
    <button class="rhel-btn" data-v="7" onclick="setRhel(7,this)">RHEL 7</button>
    <button class="rhel-btn active" data-v="8" onclick="setRhel(8,this)">RHEL 8</button>
    <button class="rhel-btn" data-v="9" onclick="setRhel(9,this)">RHEL 9</button>
    <span id="rhel-hint" style="margin-left:.5rem;font-size:.75rem;color:var(--accent)">dnf · Python 3.6 · EL8 · systemd</span>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active-mod" id="btn-mod" onclick="setMode('modification',this)">⚙ Modification</button>
    <button class="mode-btn" id="btn-cons" onclick="setMode('consultation',this)">👁 Consultation (lecture seule)</button>
  </div>

  <p class="section-title">Bibliothèque de tâches — clic pour ajouter</p>
  <div class="recipe-cats" id="recipe-cats"></div>
  <div class="recipe-grid" id="recipe-grid"></div>

  <div class="layout">
    <div style="display:flex;flex-direction:column;gap:.85rem">

      <div class="card">
        <p class="section-title">Play</p>
        <div style="display:flex;flex-direction:column;gap:.5rem">
          <div><label>Nom</label><input class="input" id="play-name" value="Playbook RHEL" oninput="build()"></div>
          <div><label>Hôtes / groupe</label><input class="input" id="play-hosts" value="all" oninput="build()"></div>
          <div class="two-col">
            <label class="check-label"><input type="checkbox" id="play-become" onchange="build()"> become: true</label>
            <div><label>gather_facts</label>
              <select class="select" id="play-facts" onchange="build()"><option value="true">true</option><option value="false">false</option></select>
            </div>
          </div>
          <div class="two-col">
            <div><label>strategy</label>
              <select class="select" id="play-strategy" onchange="build()"><option value="">linear (défaut)</option><option value="free">free</option><option value="host_pinned">host_pinned</option></select>
            </div>
            <div><label>serial</label>
              <input class="input" id="play-serial" placeholder="ex: 1 ou 25%" oninput="build()">
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <p class="section-title">Variables (vars)</p>
        <div class="task-params" id="vars-list"></div>
        <button class="btn btn--secondary btn--sm mt-sm" onclick="addVar()">+ Variable</button>
      </div>

      <div class="card">
        <p class="section-title">Tâches <span style="font-size:.7rem;color:var(--text-muted);font-weight:400;text-transform:none">(vert = lecture seule)</span></p>
        <div id="tasks-list"></div>
        <div style="display:flex;gap:.5rem;margin-top:.75rem">
          <button class="btn btn--secondary btn--sm" onclick="addTask()">+ Tâche modification</button>
          <button class="btn btn--sm" style="border:1px solid var(--success);color:var(--success);background:transparent" onclick="addTask('','command',[],'' ,'','',true)">+ Tâche consultation</button>
        </div>
      </div>

    </div>

    <div>
      <p class="section-title">Playbook YAML généré</p>
      <div class="output-box">
        <div class="output-header">
          <span>playbook.yml</span>
          <div style="display:flex;gap:.5rem">
            <button class="btn btn--sm btn--secondary" onclick="copyPlaybook()">Copier</button>
            <button class="btn btn--sm btn--ghost" onclick="clearTasks()">Vider</button>
          </div>
        </div>
        <pre class="output-pre" id="output"></pre>
      </div>
    </div>
  </div>
</div>

<script>
let rhelVersion = 8;
let recipeMode = 'modification';
let taskCount = 0;

const RHEL_HINTS = {
  6:'yum · Python 2.6 · EL6 · SysV init',
  7:'yum · Python 2.7 · EL7 · systemd',
  8:'dnf · Python 3.6 · EL8 · systemd',
  9:'dnf · Python 3.9 · EL9 · systemd'
};
function pkgMod(v){ return v<=7?'yum':'dnf'; }
function setRhel(v,btn){
  rhelVersion=v;
  document.querySelectorAll('.rhel-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('rhel-hint').textContent=RHEL_HINTS[v];
  build();
}

function setMode(mode, btn){
  recipeMode=mode;
  document.getElementById('btn-mod').className='mode-btn'+(mode==='modification'?' active-mod':'');
  document.getElementById('btn-cons').className='mode-btn'+(mode==='consultation'?' active-cons':'');
  activeRecipeCat=null;
  renderCats();
}

// ── MODIFICATION recipes ──────────────────────────────
const RECIPES_MOD = {
  'Paquets':[
    {n:'Installer un paquet',            d:'state: present',   m:()=>pkgMod(rhelVersion), a:{name:'paquet',state:'present'}},
    {n:'Installer groupe de paquets',    d:'@Development Tools',m:()=>pkgMod(rhelVersion),a:{name:'"@Development Tools"',state:'present'}},
    {n:'Mettre à jour tous les paquets', d:'state: latest',    m:()=>pkgMod(rhelVersion), a:{name:'*',state:'latest'}},
    {n:'Supprimer un paquet',            d:'state: absent',    m:()=>pkgMod(rhelVersion), a:{name:'paquet',state:'absent'}},
    {n:'Activer EPEL',                   d:'epel-release',     m:()=>pkgMod(rhelVersion), a:{name:'epel-release',state:'present'}},
    {n:'Installer plusieurs paquets',    d:'avec loop',        m:()=>pkgMod(rhelVersion), a:{name:'"{{ item }}"',state:'present'}, loop:'[httpd, curl, wget]'},
    {n:'Nettoyer cache DNF/YUM',         d:'clean all',        m:()=>pkgMod(rhelVersion)+'_clean',a:{command:'all'}},
  ],
  'Services':[
    {n:'Démarrer + activer service',     d:'started+enabled',  m:'service', a:{name:'httpd',state:'started',enabled:'yes'}},
    {n:'Arrêter + désactiver',           d:'stopped+disabled', m:'service', a:{name:'httpd',state:'stopped',enabled:'no'}},
    {n:'Redémarrer service',             d:'state: restarted', m:'service', a:{name:'httpd',state:'restarted'}},
    {n:'Recharger config (reload)',      d:'state: reloaded',  m:'service', a:{name:'httpd',state:'reloaded'}},
    {n:'daemon_reload systemd',          d:'après unit install',m:'systemd',a:{daemon_reload:'yes'}},
    {n:'Service systemd (EL7+)',         d:'systemd module',   m:'systemd', a:{name:'httpd',state:'started',enabled:'yes',daemon_reload:'yes'}},
  ],
  'Utilisateurs':[
    {n:'Créer utilisateur système',      d:'system + nologin', m:'user',  a:{name:'appuser',state:'present',system:'yes',shell:'/sbin/nologin'}},
    {n:'Créer utilisateur applicatif',   d:'avec home + groupe',m:'user', a:{name:'appuser',state:'present',home:'/home/appuser',shell:'/bin/bash',groups:'wheel',append:'yes'}},
    {n:'Ajouter au groupe wheel',        d:'sudo access',      m:'user',  a:{name:'appuser',groups:'wheel',append:'yes'}},
    {n:'Déployer clé SSH',               d:'authorized_keys',  m:'authorized_key',a:{user:'appuser',state:'present',key:'"{{ lookup(\'file\',\'~/.ssh/id_rsa.pub\') }}"'}},
    {n:'Supprimer utilisateur',          d:'userdel -r',       m:'user',  a:{name:'olduser',state:'absent',remove:'yes'}},
    {n:'Configurer sudoers',             d:'sudoers.d',        m:'copy',  a:{dest:'/etc/sudoers.d/appuser',content:'"appuser ALL=(ALL) NOPASSWD: ALL\\n"',mode:'0440',validate:'/usr/sbin/visudo -cf %s'}},
    {n:'Verrouiller compte',             d:'password_lock',    m:'user',  a:{name:'appuser',password_lock:'yes'}},
  ],
  'SELinux':[
    {n:'SELinux enforcing',              d:'mode enforcing',   m:'selinux',   a:{state:'enforcing',policy:'targeted'}},
    {n:'SELinux permissive (debug)',     d:'mode permissif',   m:'selinux',   a:{state:'permissive',policy:'targeted'}},
    {n:'Activer booléen SELinux',        d:'setsebool -P',     m:'seboolean', a:{name:'httpd_can_network_connect',state:'yes',persistent:'yes'}},
    {n:'Port SELinux (semanage)',        d:'http_port_t',      m:'seport',    a:{ports:'8080',proto:'tcp',setype:'http_port_t',state:'present'}},
    {n:'Contexte fichier fcontext',      d:'semanage fcontext',m:'sefcontext',a:{target:'/opt/app(/.*)?',setype:'httpd_sys_content_t',state:'present'}},
    {n:'Restorecon',                     d:'-Rv /chemin',      m:'command',   a:{cmd:'/usr/sbin/restorecon -Rv /var/www/html'}},
  ],
  'Firewall':[
    {n:'Ouvrir service firewalld',       d:'permanent + now',  m:'firewalld', a:{service:'http',state:'enabled',permanent:'yes',immediate:'yes'}},
    {n:'Ouvrir port TCP',               d:'port/tcp',         m:'firewalld', a:{port:'8080/tcp',state:'enabled',permanent:'yes',immediate:'yes'}},
    {n:'Autoriser IP source',           d:'--add-source',     m:'firewalld', a:{source:'192.168.1.0/24',zone:'internal',state:'enabled',permanent:'yes'}},
    {n:'Retirer règle firewall',        d:'state: disabled',  m:'firewalld', a:{service:'http',state:'disabled',permanent:'yes'}},
    {n:'Reload firewalld',              d:'complet reload',   m:'command',   a:{cmd:'firewall-cmd --reload'}},
  ],
  'Fichiers':[
    {n:'Créer répertoire',              d:'mkdir -p + droits', m:'file',       a:{path:'/opt/app',state:'directory',mode:'0755',owner:'appuser',group:'appuser'}},
    {n:'Copier fichier',               d:'copy local→remote', m:'copy',       a:{src:'files/app.conf',dest:'/etc/app/app.conf',mode:'0644',owner:'root',group:'root'}},
    {n:'Déployer template Jinja2',     d:'.j2 → remote',     m:'template',   a:{src:'templates/app.conf.j2',dest:'/etc/app/app.conf',mode:'0644'}},
    {n:'Modifier une ligne',           d:'lineinfile',        m:'lineinfile', a:{path:'/etc/ssh/sshd_config',regexp:'^#?PermitRootLogin',line:'PermitRootLogin no',state:'present'}},
    {n:'Ajouter bloc de config',       d:'blockinfile',       m:'blockinfile',a:{path:'/etc/hosts',block:'"192.168.1.10 srv-app"',state:'present'}},
    {n:'Symlink',                      d:'state: link',       m:'file',       a:{src:'/opt/app/current',dest:'/opt/app/latest',state:'link'}},
    {n:'Supprimer fichier/dossier',    d:'state: absent',     m:'file',       a:{path:'/tmp/install',state:'absent'}},
    {n:'Télécharger fichier (get_url)',d:'HTTP download',     m:'get_url',    a:{url:'https://example.com/file.tar.gz',dest:'/tmp/file.tar.gz',mode:'0644'}},
    {n:'Décompresser archive',         d:'unarchive',         m:'unarchive',  a:{src:'/tmp/file.tar.gz',dest:'/opt/app',remote_src:'yes'}},
  ],
  'Réseau':[
    {n:'Configurer hostname',          d:'hostnamectl',       m:'hostname',  a:{name:'srv-prod-01.domaine.local'}},
    {n:'Entrée /etc/hosts',            d:'lineinfile',        m:'lineinfile',a:{path:'/etc/hosts',line:'"192.168.1.10 srv-app srv-app.domaine.local"',state:'present'}},
    {n:'Interface réseau (nmcli)',     d:'NetworkManager',    m:'nmcli',     a:{conn_name:'eth0',type:'ethernet',ip4:'192.168.1.100/24',gw4:'192.168.1.1',state:'present'}},
    {n:'DNS (resolv.conf)',            d:'via copy',          m:'copy',      a:{dest:'/etc/resolv.conf',content:'"nameserver 8.8.8.8\\nnameserver 1.1.1.1\\n"'}},
  ],
  'Subscription RHEL':[
    {n:'Enregistrer sur RHSM',         d:'auto_attach',       m:'redhat_subscription',a:{state:'present',username:'"{{ rhsm_user }}"',password:'"{{ rhsm_password }}"',auto_attach:'yes'}},
    {n:'Activer dépôt RHSM',           d:'--enable',          m:'rhsm_repository',   a:{name:'rhel-8-for-x86_64-appstream-rpms',state:'enabled'}},
    {n:'Enregistrer sur Satellite',    d:'activation key',    m:'redhat_subscription',a:{state:'present',activationkey:'"{{ activation_key }}"',org_id:'"{{ org_id }}"',server_hostname:'"satellite.domaine.local"'}},
    {n:'Désabonner système',           d:'unregister',        m:'redhat_subscription',a:{state:'absent'}},
  ],
  'Sécurité':[
    {n:'Désactiver SSH root login',    d:'PermitRootLogin no', m:'lineinfile',a:{path:'/etc/ssh/sshd_config',regexp:'^#?PermitRootLogin',line:'PermitRootLogin no',state:'present'},notify:'restart sshd'},
    {n:'Timeout SSH inactif',          d:'ClientAliveInterval',m:'lineinfile',a:{path:'/etc/ssh/sshd_config',regexp:'^#?ClientAliveInterval',line:'ClientAliveInterval 300',state:'present'},notify:'restart sshd'},
    {n:'Limites système (ulimits)',    d:'pam_limits',         m:'pam_limits',a:{domain:'*',limit_type:'soft',limit_item:'nofile',value:'65536'}},
    {n:'Désactiver service inutile',   d:'bluetooth/cups…',    m:'service',   a:{name:'bluetooth',state:'stopped',enabled:'no'}},
    {n:'Sysctl — param noyau',         d:'sysctl.conf',        m:'sysctl',    a:{name:'net.ipv4.ip_forward',value:'1',state:'present',reload:'yes'}},

let activeRecipeCat = null;
const catContainer = document.getElementById('recipe-cats');
const recipeContainer = document.getElementById('recipe-grid');

function renderCats(){
  const data = recipeMode==='modification' ? RECIPES_MOD : RECIPES_CONS;
  const cats = Object.keys(data);
  catContainer.innerHTML = '';
  if(!activeRecipeCat || !data[activeRecipeCat]) activeRecipeCat = cats[0];
  cats.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'cat-btn' + (cat===activeRecipeCat ? (recipeMode==='consultation'?' cons-active':' active') : '');
    b.textContent = cat;
    b.onclick = () => { activeRecipeCat=cat; renderCats(); };
    catContainer.appendChild(b);
  });
  renderRecipes();
}

function renderRecipes(){
  recipeContainer.innerHTML='';
  const data = recipeMode==='modification' ? RECIPES_MOD : RECIPES_CONS;
  (data[activeRecipeCat]||[]).forEach(r=>{
    const card=document.createElement('div');
    if(r.special==='mail') card.className='recipe-card mail-r';
    else if(r.special==='csv') card.className='recipe-card csv-r';
    else card.className='recipe-card'+(r.ro?' ro':'');
    const modDisplay = r.special ? (r.special==='mail'?'mail':'csv/lineinfile') : (typeof r.m==='function'?r.m():r.m);
    card.innerHTML=`<strong>${r.n}</strong><span>${r.d} · <code>${modDisplay}</code></span>`;
    card.onclick=()=>addRecipeTask(r);
    recipeContainer.appendChild(card);
  });
}

function addRecipeTask(recipe){
  if(recipe.special==='mail'){ addMailTask(); return; }
  if(recipe.special==='csv'){  addCsvTask();  return; }
  const mod = typeof recipe.m==='function' ? recipe.m() : recipe.m;
  const args = recipe.a || {};
  const params = Object.entries(args)
    .map(([k,v])=>({k,p:typeof v==='function'?v():v}))
    .filter(p=>p.k!=='cmd');
  const cmdVal = typeof args.cmd==='function' ? args.cmd() : (args.cmd||'');

  const roFlag = !!recipe.ro;
  const varName = recipe.n.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/_{2,}/g,'_').replace(/^_|_$/g,'').slice(0,25)+'_r';
  const needsRegister = roFlag && ['command','shell','stat','slurp','find','getent','uri'].includes(mod);

  addTask(recipe.n, mod, params, recipe.notify||'', recipe.loop||'', cmdVal, needsRegister?varName:'', roFlag, recipe.when||'');

  if(roFlag && needsRegister){
    let debugVar;
    if(mod==='stat') debugVar=`${varName}.stat`;
    else if(mod==='slurp') debugVar=`${varName}.content | b64decode`;
    else debugVar=`${varName}.stdout_lines`;
    addTask(`  Debug › ${recipe.n}`, 'debug', [{k:'var',p:debugVar}],'','','','',false,'');
  } else if(roFlag){
    if(mod==='setup') addTask('  Debug › Infos OS','debug',[{k:'var',p:'ansible_distribution+" "+ansible_distribution_version'}],'','','','',false,'');
    else if(mod==='service_facts') addTask('  Debug › Services','debug',[{k:'var',p:'ansible_facts.services.keys()|list|sort'}],'','','','',false,'');
    else if(mod==='package_facts') addTask('  Debug › Paquets','debug',[{k:'var',p:'ansible_facts.packages.keys()|list|sort'}],'','','','',false,'');
    else if(mod==='ping') addTask('  Debug › Ping','debug',[{k:'msg',p:'"Hôte {{ inventory_hostname }} accessible"'}],'','','','',false,'');
  }
}

function addTask(name='', module='dnf', params=[], notify='', loop='', cmd='', register='', ro=false, when=''){
  taskCount++;
  const list=document.getElementById('tasks-list');
  const card=document.createElement('div');
  card.className='task-card'+(ro?' ro-task':'');
  card.id=`task-${taskCount}`;

  const MODS=['debug','setup','service_facts','package_facts','ping','dnf','yum','service','systemd','copy','template','file','lineinfile','blockinfile','user','authorized_key','firewalld','selinux','seboolean','seport','sefcontext','command','shell','hostname','nmcli','rhsm_repository','redhat_subscription','pam_limits','sysctl','get_url','unarchive','uri','stat','slurp','find','getent','fetch','mail'];
  const modOpts=MODS.map(m=>`<option value="${m}"${m===module?' selected':''}>${m}</option>`).join('');
  const paramsHtml=(params.length?params:[{k:'',p:''}]).map(p=>`<div class="kv-row"><input class="input" value="${escH(p.k)}" style="flex:0 0 130px" oninput="build()"><input class="input" value="${escH(p.p)}" oninput="build()"><button class="btn btn--ghost btn--sm" onclick="this.closest('.kv-row').remove();build()">✕</button></div>`).join('');

  card.innerHTML=`<div class="task-header">
    <span class="task-num${ro?' ro':''}">${taskCount}${ro?' 👁':''}</span>
    <input class="input task-title-input" placeholder="Nom de la tâche" value="${escH(name||'Tâche '+taskCount)}" oninput="build()">
    <button class="btn btn--ghost btn--sm" onclick="this.closest('.task-card').remove();renum();build()">✕</button>
  </div>
  <div style="display:flex;gap:.4rem;align-items:center;margin-bottom:.4rem;flex-wrap:wrap;">
    <label style="margin:0;font-size:.78rem;color:var(--text-muted)">Module:</label>
    <select class="select" style="width:auto;min-width:120px" onchange="build()">${modOpts}</select>
    ${cmd?`<input class="input cmd-input" placeholder="commande" value="${escH(cmd)}" style="flex:1;min-width:140px" oninput="build()">`:'<button class="btn btn--ghost btn--sm" onclick="addTaskParam(this)">+ param</button>'}
  </div>
  ${!cmd?`<div class="task-params">${paramsHtml}</div>`:''}
  <div class="extras-row">
    <input class="input" placeholder="notify: handler" value="${escH(notify)}" oninput="build()">
    <input class="input" placeholder="when: condition" value="${escH(when)}" oninput="build()">
    <input class="input" placeholder="register: var" value="${escH(register)}" oninput="build()">
    <input class="input" placeholder="loop: [...]" value="${escH(loop)}" oninput="build()">
    <label class="check-label" title="changed_when: false"><input type="checkbox" class="cwf" ${ro?'checked':''} onchange="build()"> cwf</label>
  </div>`;
  list.appendChild(card);
  if(cmd && !params.length) {} // cmd-input handles it
  build();
}

function addTaskParam(btn){
  const pp=btn.closest('.task-card').querySelector('.task-params');
  if(!pp) return;
  const row=document.createElement('div'); row.className='kv-row';
  row.innerHTML=`<input class="input" placeholder="paramètre" style="flex:0 0 130px" oninput="build()"><input class="input" placeholder="valeur" oninput="build()"><button class="btn btn--ghost btn--sm" onclick="this.closest('.kv-row').remove();build()">✕</button>`;
  pp.appendChild(row); build();
}

function renum(){
  document.querySelectorAll('.task-num').forEach((el,i)=>{
    el.textContent=(i+1)+(el.classList.contains('ro')?' 👁':'');
  });
}

function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function build(){
  const name=document.getElementById('play-name').value||'Playbook';
  const hosts=document.getElementById('play-hosts').value||'all';
  const become=document.getElementById('play-become').checked;
  const facts=document.getElementById('play-facts').value;
  const strategy=document.getElementById('play-strategy').value;
  const serial=document.getElementById('play-serial').value;

  const lines=['---',`# Playbook généré — RHEL ${rhelVersion}`,`- name: "${name}"`,`  hosts: ${hosts}`];
  if(become) lines.push('  become: true');
  lines.push(`  gather_facts: ${facts}`);
  if(strategy) lines.push(`  strategy: ${strategy}`);
  if(serial) lines.push(`  serial: ${serial}`);

  const varRows=[...document.querySelectorAll('#vars-list .kv-row')];
  if(varRows.length){ lines.push('  vars:'); varRows.forEach(r=>{ const[k,v]=[...r.querySelectorAll('input')].map(i=>i.value); if(k) lines.push(`    ${k}: ${v||'""'}`); }); }

  const taskCards=[...document.querySelectorAll('.task-card')];
  if(taskCards.length){
    lines.push('  tasks:');
    taskCards.forEach(card=>{
      if(card.dataset.tasktype==='mail'){
        const tname=card.querySelector('.task-title-input')?.value||'Envoyer rapport par mail';
        const mp={};
        card.querySelectorAll('.mail-param').forEach(i=>{mp[i.dataset.key]=i.value;});
        const body=card.querySelector('.mail-body')?.value||'';
        lines.push(`    - name: "${tname}"`);
        lines.push(`      mail:`);
        if(mp.host)    lines.push(`        host: "${mp.host}"`);
        if(mp.port)    lines.push(`        port: ${mp.port||25}`);
        if(mp.from)    lines.push(`        from: "${mp.from}"`);
        if(mp.to){     lines.push(`        to:`); lines.push(`          - "${mp.to}"`); }
        if(mp.subject) lines.push(`        subject: "${mp.subject}"`);
        lines.push(`        subtype: html`);
        lines.push(`        body: |`);
        body.split('\n').forEach(l=>lines.push(`          ${l}`));
        lines.push(`      delegate_to: localhost`);
        lines.push(`      run_once: true`);
        return;
      }
      const taskName=(card.querySelector('.task-title-input')?.value||'Task').trim();
      const mod=card.querySelector('select')?.value||'shell';
      const cmdInput=card.querySelector('.cmd-input');
      const cmd=cmdInput?.value||'';
      const extras=[...card.querySelectorAll('.extras-row input[type="text"],.extras-row input:not([type="checkbox"])')];
      const notify=extras[0]?.value||'';
      const when=extras[1]?.value||'';
      const reg=extras[2]?.value||'';
      const loop=extras[3]?.value||'';
      const cwf=card.querySelector('.cwf')?.checked;

      lines.push(`    - name: "${taskName}"`);
      if(cmd){
        lines.push(`      ${mod}: ${cmd}`);
      } else {
        const kvs=[...card.querySelectorAll('.task-params .kv-row')];
        const pairs=kvs.map(r=>[...r.querySelectorAll('input')].map(i=>i.value)).filter(([k])=>k);
        if(!pairs.length){ lines.push(`      ${mod}:`); }
        else if(pairs.length===1 && ['ping','setup','service_facts','package_facts'].includes(mod)){
          lines.push(`      ${mod}:`);
        } else {
          lines.push(`      ${mod}:`);
          pairs.forEach(([k,v])=>lines.push(`        ${k}: ${v}`));
        }
      }
      if(reg)    lines.push(`      register: ${reg}`);
      if(cwf)    lines.push(`      changed_when: false`);
      if(notify) lines.push(`      notify: ${notify}`);
      if(when)   lines.push(`      when: ${when}`);
      if(loop)   lines.push(`      loop: ${loop}`);
    });
  }

  document.getElementById('output').textContent=lines.join('\n');
}

function copyPlaybook(){
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  const b=event.target; b.textContent='Copié!'; b.classList.add('btn--primary');
  setTimeout(()=>{b.textContent='Copier';b.classList.remove('btn--primary');},1500);
}

function clearTasks(){ document.getElementById('tasks-list').innerHTML=''; taskCount=0; build(); }

// Init
renderCats();
addTask('Vérifier connectivité','ping',[]);
addTask('Installer httpd',pkgMod(rhelVersion),[{k:'name',p:'httpd'},{k:'state',p:'present'}],'restart httpd');
addTask('Démarrer et activer httpd','service',[{k:'name',p:'httpd'},{k:'state',p:'started'},{k:'enabled',p:'yes'}]);
build();
</script>
