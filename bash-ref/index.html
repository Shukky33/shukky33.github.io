<!DOCTYPE html>
<!-- Bash Reference — aucune donnée personnelle stockée -->
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bash Reference — Portail</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .tool-header{display:flex;align-items:center;gap:1rem;padding:1.5rem 0;border-bottom:1px solid var(--border);margin-bottom:2rem;}
    .tool-header h1{font-size:1.5rem;flex:1;}
    .search-bar{position:sticky;top:0;background:var(--bg-base);padding:.75rem 0;z-index:10;border-bottom:1px solid var(--border);margin-bottom:1.5rem;}
    .search-bar input{width:100%;}
    .cmd-section{margin-bottom:2.5rem;}
    .cmd-section-title{font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;}
    .cmd-section-title span{font-family:var(--font-mono);background:var(--bg-input);border:1px solid var(--border);padding:.1rem .5rem;border-radius:var(--radius-sm);font-size:.9rem;}
    .examples-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:.75rem;}
    .example-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;transition:border-color var(--transition);}
    .example-card:hover{border-color:var(--border-focus);}
    .example-card .cmd{font-family:var(--font-mono);font-size:.82rem;padding:.65rem 1rem;background:var(--bg-input);color:var(--accent2);word-break:break-all;cursor:pointer;position:relative;}
    .example-card .cmd:hover::after{content:'copier';position:absolute;right:.75rem;top:50%;transform:translateY(-50%);font-size:.7rem;color:var(--text-muted);font-family:var(--font);}
    .example-card .desc{padding:.5rem 1rem;font-size:.82rem;color:var(--text-secondary);border-top:1px solid var(--border);}
    .hidden{display:none!important;}
    .tag{display:inline-block;padding:.1rem .45rem;border-radius:999px;font-size:.7rem;background:var(--bg-input);border:1px solid var(--border);color:var(--text-muted);margin-right:.3rem;}
    .copied-toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--success);color:#fff;padding:.5rem 1.1rem;border-radius:var(--radius-sm);font-size:.85rem;opacity:0;transition:opacity .2s;pointer-events:none;}
    .copied-toast.show{opacity:1;}
  </style>
</head>
<body>
<div class="container">
  <header class="tool-header">
    <a href="../" class="btn btn--ghost btn--sm">← Retour</a>
    <h1>Bash Reference</h1>
    <span class="badge badge--version">v1.0.0</span>
  </header>

  <div class="search-bar">
    <input class="input" id="search" type="text" placeholder="Rechercher une commande, option, ou description…" oninput="filterCards()">
  </div>

  <div id="content"></div>
</div>
<div class="copied-toast" id="toast">Copié !</div>

<script>
const DATA = [
  { cmd:'find', entries:[
    {c:'find . -name "*.log"',               d:'Trouver tous les fichiers .log récursivement'},
    {c:'find /var -name "*.log" -mtime +7',  d:'Fichiers .log de plus de 7 jours dans /var'},
    {c:'find . -type f -size +100M',         d:'Fichiers de plus de 100 Mo'},
    {c:'find . -type d -name node_modules',  d:'Trouver les dossiers node_modules'},
    {c:'find . -name "*.conf" -exec grep -l "listen" {} \\;', d:'Fichiers .conf contenant "listen"'},
    {c:'find /home -user alice -type f',     d:'Fichiers appartenant à alice'},
    {c:'find . -newer reference.txt',        d:'Fichiers plus récents que reference.txt'},
    {c:'find . -perm 777',                   d:'Fichiers avec permissions 777'},
    {c:'find . -maxdepth 2 -name "*.sh"',    d:'Fichiers .sh sur 2 niveaux max'},
    {c:'find . -empty',                      d:'Fichiers et dossiers vides'},
    {c:'find . -name "*.bak" -delete',       d:'Supprimer tous les fichiers .bak'},
    {c:'find . -type f -exec chmod 644 {} \\;', d:'Appliquer chmod 644 à tous les fichiers'},
  ]},
  { cmd:'grep', entries:[
    {c:'grep "pattern" fichier.txt',          d:'Chercher un pattern dans un fichier'},
    {c:'grep -r "pattern" /var/log/',         d:'Chercher récursivement dans un dossier'},
    {c:'grep -i "error" syslog',              d:'Insensible à la casse'},
    {c:'grep -n "TODO" *.py',                 d:'Afficher les numéros de ligne'},
    {c:'grep -v "debug" app.log',             d:'Exclure les lignes contenant "debug"'},
    {c:'grep -c "ERROR" *.log',               d:'Compter les occurrences par fichier'},
    {c:'grep -l "FATAL" /var/log/*.log',      d:'Lister uniquement les fichiers matchants'},
    {c:'grep -A 3 -B 3 "exception" app.log', d:'3 lignes avant et après le match'},
    {c:'grep -E "^[0-9]{4}-[0-9]{2}" log',   d:'Regex étendue (ERE)'},
    {c:'grep -P "\\d{3}-\\d{4}" contacts',   d:'Regex Perl (PCRE)'},
    {c:'grep -w "root" /etc/passwd',          d:'Mot entier uniquement'},
    {c:'grep --include="*.py" -r "import" .', d:'Filtrer par extension lors du grep récursif'},
  ]},
  { cmd:'awk', entries:[
    {c:"awk '{print $1}' fichier",            d:'Afficher le 1er champ (séparateur espace)'},
    {c:"awk -F: '{print $1,$3}' /etc/passwd", d:'Séparateur ":" — afficher champs 1 et 3'},
    {c:"awk '/ERROR/ {print}' app.log",       d:'Imprimer les lignes contenant ERROR'},
    {c:"awk '{sum+=$5} END {print sum}' f",  d:'Sommer la colonne 5'},
    {c:"awk 'NR==5,NR==10' fichier",          d:'Afficher les lignes 5 à 10'},
    {c:"awk 'NR>1' fichier",                  d:'Ignorer la première ligne (header CSV)'},
    {c:"awk '{print NF, $0}' fichier",        d:'Afficher le nombre de champs par ligne'},
    {c:"awk '!seen[$0]++' fichier",           d:'Dédupliquer les lignes'},
    {c:"awk 'length($0)>80' fichier",         d:'Lignes de plus de 80 caractères'},
    {c:"awk 'BEGIN{FS=\",\";OFS=\"\\t\"} {print $1,$3}' f", d:'CSV vers TSV'},
  ]},
  { cmd:'sed', entries:[
    {c:"sed 's/ancien/nouveau/' fichier",    d:'Remplacer la 1ère occurrence par ligne'},
    {c:"sed 's/ancien/nouveau/g' fichier",   d:'Remplacer toutes les occurrences'},
    {c:"sed -i 's/foo/bar/g' fichier.txt",   d:'Remplacement en place (modifier le fichier)'},
    {c:"sed -n '10,20p' fichier",            d:'Afficher les lignes 10 à 20'},
    {c:"sed '/^#/d' fichier.conf",           d:'Supprimer les lignes de commentaires'},
    {c:"sed '/^$/d' fichier",                d:'Supprimer les lignes vides'},
    {c:"sed -n '/START/,/END/p' fichier",    d:'Extraire entre deux patterns'},
    {c:"sed '1s/^/Première ligne\\n/' f",    d:'Insérer une ligne au début'},
    {c:"sed '$a Dernière ligne' fichier",     d:'Ajouter une ligne à la fin'},
    {c:"sed 's/\\s\\+/ /g' fichier",         d:'Compresser les espaces multiples'},
  ]},
  { cmd:'tar', entries:[
    {c:'tar -czf archive.tar.gz dossier/',   d:'Créer une archive gzip'},
    {c:'tar -cjf archive.tar.bz2 dossier/',  d:'Créer une archive bzip2'},
    {c:'tar -xzf archive.tar.gz',            d:'Extraire une archive gzip'},
    {c:'tar -xzf archive.tar.gz -C /dest/',  d:'Extraire vers un dossier spécifique'},
    {c:'tar -tzf archive.tar.gz',            d:'Lister le contenu sans extraire'},
    {c:'tar -xzf archive.tar.gz fichier.txt',d:'Extraire un seul fichier'},
    {c:'tar -czf backup-$(date +%F).tar.gz .', d:'Archive avec date dans le nom'},
    {c:'tar -czf - dossier/ | ssh user@host "cat > /backup/arch.tar.gz"', d:'Archive et transfert SSH en pipe'},
    {c:'tar --exclude="*.log" -czf arch.tar.gz dossier/', d:'Exclure des fichiers'},
  ]},
  { cmd:'rsync', entries:[
    {c:'rsync -av source/ dest/',             d:'Sync locale avec verbose'},
    {c:'rsync -avz source/ user@host:/dest/', d:'Sync distante avec compression'},
    {c:'rsync -avz --delete source/ dest/',   d:'Sync miroir (supprime en destination)'},
    {c:'rsync -avzn source/ dest/',           d:'Dry-run : simuler sans modifier'},
    {c:'rsync -avz --exclude="*.log" src/ dst/', d:'Exclure des fichiers'},
    {c:'rsync -avz --exclude-from=".rsyncignore" src/ dst/', d:'Exclusions depuis un fichier'},
    {c:'rsync -avz --progress src/ dst/',     d:'Afficher la progression'},
    {c:'rsync -avz -e "ssh -p 2222" src/ user@host:/dst/', d:'SSH sur un port non standard'},
    {c:'rsync -avz --bwlimit=1000 src/ dst/', d:'Limiter la bande passante à 1 Mo/s'},
    {c:'rsync -a --backup --backup-dir=/backup/$(date +%F) src/ dst/', d:'Backup incrémental avec dossier daté'},
  ]},
];

function filterCards(){
  const q=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.example-card').forEach(card=>{
    const txt=(card.dataset.cmd+' '+card.dataset.desc).toLowerCase();
    card.classList.toggle('hidden',q&&!txt.includes(q));
  });
  document.querySelectorAll('.cmd-section').forEach(sec=>{
    const visible=[...sec.querySelectorAll('.example-card')].some(c=>!c.classList.contains('hidden'));
    sec.classList.toggle('hidden',q&&!visible);
  });
}

function copyCmd(cmd){
  navigator.clipboard.writeText(cmd);
  const t=document.getElementById('toast'); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

const content=document.getElementById('content');
DATA.forEach(section=>{
  const sec=document.createElement('div'); sec.className='cmd-section';
  sec.innerHTML=`<div class="cmd-section-title"><span>${section.cmd}</span></div><div class="examples-grid"></div>`;
  const grid=sec.querySelector('.examples-grid');
  section.entries.forEach(e=>{
    const card=document.createElement('div'); card.className='example-card';
    card.dataset.cmd=section.cmd; card.dataset.desc=e.d;
    card.innerHTML=`<div class="cmd" onclick="copyCmd(\`${e.c.replace(/`/g,'\\`')}\`)">${e.c}</div><div class="desc">${e.d}</div>`;
    grid.appendChild(card);
  });
  content.appendChild(sec);
});
</script>
</body>
</html>
