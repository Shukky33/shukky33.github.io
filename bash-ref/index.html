<!DOCTYPE html>
<!-- Bash Reference & Constructeur Linux — aucune donnée personnelle stockée -->
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bash Reference — Portail</title>
  <style>
/* Portail Personnel — Charte graphique — aucune donnée personnelle */
:root{--bg-base:#0d1117;--bg-card:#161b22;--bg-card-hover:#1c2330;--bg-input:#21262d;--border:#30363d;--border-focus:#58a6ff;--accent:#58a6ff;--accent-dim:#1f6feb;--accent2:#39d0d8;--text-primary:#e6edf3;--text-secondary:#8b949e;--text-muted:#484f58;--success:#3fb950;--warning:#d29922;--danger:#f85149;--radius-sm:6px;--radius-md:10px;--radius-lg:16px;--shadow-card:0 4px 24px rgba(0,0,0,.4);--shadow-btn:0 2px 8px rgba(88,166,255,.15);--font:'Segoe UI',system-ui,-apple-system,sans-serif;--font-mono:'Cascadia Code','Consolas',monospace;--transition:160ms ease}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);font-size:15px;line-height:1.6;color:var(--text-primary);background:var(--bg-base);min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
h1{font-size:2rem;font-weight:700;letter-spacing:-.5px}h2{font-size:1.35rem;font-weight:600}
p{color:var(--text-secondary)}
code,pre{font-family:var(--font-mono);font-size:.875em;background:var(--bg-input);border-radius:var(--radius-sm)}code{padding:.15em .4em}pre{padding:1rem;overflow-x:auto;border:1px solid var(--border)}
.container{width:100%;max-width:1100px;margin-inline:auto;padding-inline:1.5rem}
.btn{display:inline-flex;align-items:center;gap:.45rem;padding:.5rem 1.1rem;border:1px solid transparent;border-radius:var(--radius-sm);font-family:var(--font);font-size:.875rem;font-weight:500;cursor:pointer;transition:background var(--transition),border-color var(--transition);white-space:nowrap;text-decoration:none!important}
.btn--primary{background:var(--accent-dim);border-color:var(--accent-dim);color:#fff}.btn--primary:hover{background:var(--accent);border-color:var(--accent)}
.btn--secondary{background:transparent;border-color:var(--border);color:var(--text-primary)}.btn--secondary:hover{background:var(--bg-input);border-color:var(--accent)}
.btn--ghost{background:transparent;border-color:transparent;color:var(--text-secondary)}.btn--ghost:hover{color:var(--text-primary);background:var(--bg-input)}
.btn--sm{padding:.35rem .75rem;font-size:.8rem}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.5rem;box-shadow:var(--shadow-card);transition:border-color var(--transition),background var(--transition)}
.card:hover{border-color:var(--accent);background:var(--bg-card-hover)}
.badge{display:inline-block;padding:.15em .55em;border-radius:999px;font-size:.72rem;font-weight:600}
.badge--version{background:var(--bg-input);color:var(--accent);border:1px solid var(--border)}
.input,.select,.textarea{width:100%;padding:.55rem .85rem;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-family:var(--font);font-size:.9rem;transition:border-color var(--transition),box-shadow var(--transition)}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(88,166,255,.15)}
.input::placeholder,.textarea::placeholder{color:var(--text-muted)}
label{font-size:.875rem;color:var(--text-secondary);display:block;margin-bottom:.35rem}
.mt-sm{margin-top:.5rem}.mt-md{margin-top:1rem}.mt-lg{margin-top:2rem}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:var(--bg-base)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}
::selection{background:rgba(88,166,255,.3)}

/* Tool styles */
.tool-header{display:flex;align-items:center;gap:1rem;padding:1.5rem 0;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.tool-header h1{font-size:1.5rem;flex:1}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.tab{padding:.55rem 1.2rem;font-size:.875rem;font-weight:500;color:var(--text-secondary);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:transparent;border-top:none;border-left:none;border-right:none;transition:color var(--transition)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-pane{display:none}.tab-pane.active{display:block}
.search-bar{position:sticky;top:0;background:var(--bg-base);padding:.75rem 0;z-index:10;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.cmd-section{margin-bottom:2.5rem}
.cmd-section-title{font-size:1rem;font-weight:700;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.cmd-section-title span{font-family:var(--font-mono);background:var(--bg-input);border:1px solid var(--border);padding:.1rem .5rem;border-radius:var(--radius-sm);font-size:.9rem}
.examples-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:.75rem}
.example-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;transition:border-color var(--transition)}
.example-card:hover{border-color:var(--border-focus)}
.example-card .cmd{font-family:var(--font-mono);font-size:.82rem;padding:.65rem 1rem;background:var(--bg-input);color:var(--accent2);word-break:break-all;cursor:pointer;position:relative}
.example-card .cmd:hover::after{content:'copier';position:absolute;right:.75rem;top:50%;transform:translateY(-50%);font-size:.7rem;color:var(--text-muted);font-family:var(--font)}
.example-card .desc{padding:.5rem 1rem;font-size:.82rem;color:var(--text-secondary);border-top:1px solid var(--border)}
.hidden{display:none!important}
.copied-toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--success);color:#fff;padding:.5rem 1.1rem;border-radius:var(--radius-sm);font-size:.85rem;opacity:0;transition:opacity .2s;pointer-events:none}
.copied-toast.show{opacity:1}

/* Builder */
.bricks{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
.brick{padding:.45rem 1rem;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-size:.875rem;font-weight:600;cursor:pointer;transition:all var(--transition)}
.brick:hover{border-color:var(--accent);color:var(--accent)}
.brick.active{background:var(--accent-dim);border-color:var(--accent-dim);color:#fff}
.brick-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.25rem;margin-bottom:1.5rem;display:none}
.brick-panel.active{display:block}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.85rem;margin-bottom:1rem}
.form-row{display:flex;flex-direction:column;gap:.3rem}
.output-cmd{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem;margin-top:1rem;font-family:var(--font-mono);font-size:.9rem;color:var(--accent2);word-break:break-all;min-height:3rem;white-space:pre-wrap}
.section-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:.75rem}
.check-row{display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:var(--text-secondary);cursor:pointer}
.check-row input{width:15px;height:15px;accent-color:var(--accent)}
.pipe-chain{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-top:.75rem}
.pipe-badge{font-family:var(--font-mono);font-size:.75rem;background:var(--bg-input);border:1px solid var(--border);border-radius:999px;padding:.1rem .5rem;color:var(--accent2)}
  </style>
</head>
<body>
<div class="container">
  <header class="tool-header">
    <a href="../" class="btn btn--ghost btn--sm">← Retour</a>
    <h1>Bash Reference</h1>
    <span class="badge badge--version">v1.1.0</span>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('ref',this)">📖 Référence</button>
    <button class="tab" onclick="switchTab('build',this)">🔧 Constructeur</button>
  </div>

  <!-- ── TAB: Référence ── -->
  <div class="tab-pane active" id="tab-ref">
    <div class="search-bar">
      <input class="input" id="search" type="text" placeholder="Rechercher — find, grep, awk, sed, tar, rsync, systemctl…" oninput="filterCards()">
    </div>
    <div id="content"></div>
  </div>

  <!-- ── TAB: Constructeur ── -->
  <div class="tab-pane" id="tab-build">
    <p style="color:var(--text-secondary);margin-bottom:1rem;font-size:.9rem">Sélectionne une brique pour construire ta commande. Les options sont adaptées à chaque outil.</p>
    <div class="bricks" id="bricks"></div>
    <div id="panels"></div>
    <div id="build-output" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
        <span class="section-label">Commande générée</span>
        <button class="btn btn--sm btn--secondary" onclick="copyBuild()">Copier</button>
      </div>
      <div class="output-cmd" id="cmd-out"></div>
      <div class="pipe-chain" id="pipe-chain"></div>
    </div>
  </div>
</div>
<div class="copied-toast" id="toast">Copié !</div>

<script>
// ── Tab switching ──────────────────────────────────────
function switchTab(id, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

// ── Reference data ─────────────────────────────────────
const DATA = [

function filterCards(){
  const q=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.example-card').forEach(card=>{
    const txt=(card.dataset.cmd+' '+card.dataset.desc).toLowerCase();
    card.classList.toggle('hidden',q&&!txt.includes(q));
  });
  document.querySelectorAll('.cmd-section').forEach(sec=>{
    const visible=[...sec.querySelectorAll('.example-card')].some(c=>!c.classList.contains('hidden'));
    sec.classList.toggle('hidden',q&&!visible);
  });
}

function copyCmd(cmd){
  navigator.clipboard.writeText(cmd);
  const t=document.getElementById('toast'); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

const content=document.getElementById('content');
DATA.forEach(section=>{
  const sec=document.createElement('div'); sec.className='cmd-section';
  sec.innerHTML=`<div class="cmd-section-title"><span>${section.cmd}</span></div><div class="examples-grid"></div>`;
  const grid=sec.querySelector('.examples-grid');
  section.entries.forEach(e=>{
    const card=document.createElement('div'); card.className='example-card';
    card.dataset.cmd=section.cmd; card.dataset.desc=e.d;
    card.innerHTML=`<div class="cmd" onclick="copyCmd(\`${e.c.replace(/`/g,'\\`').replace(/\\/g,'\\\\')}\`)">${e.c.replace(/</g,'&lt;')}</div><div class="desc">${e.d}</div>`;
    grid.appendChild(card);
  });
  content.appendChild(sec);
});

  <div class="form-row"><label>Shell</label><select class="select" id="u-shell" onchange="buseradd()"><option value="/bin/bash">/bin/bash</option><option value="/sbin/nologin">/sbin/nologin</option><option value="/bin/sh">/bin/sh</option></select></div>
  <div class="form-row"><label>Groupe(s) supplémentaire(s)</label><input class="input" id="u-groups" placeholder="wheel,docker" oninput="buseradd()"></div>
  <div class="form-row"><label>Home (-d)</label><input class="input" id="u-home" placeholder="/home/appuser" oninput="buseradd()"></div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:.5rem">
  <label class="check-row"><input type="checkbox" id="u-m" onchange="buseradd()"> -m créer home</label>
  <label class="check-row"><input type="checkbox" id="u-sys" onchange="buseradd()"> -r compte système</label>
  <label class="check-row"><input type="checkbox" id="u-del-r" onchange="buseradd()"> -r supprimer home (userdel)</label>
</div>`,

  firewall:`<div class="section-label">Gérer le firewall (firewall-cmd)</div>
<div class="form-grid">
  <div class="form-row"><label>Action</label><select class="select" id="fw-action" onchange="bfw()">
    <option value="add-service">Ouvrir service</option><option value="remove-service">Fermer service</option>
    <option value="add-port">Ouvrir port</option><option value="remove-port">Fermer port</option>
    <option value="add-source">Autoriser IP/réseau source</option><option value="remove-source">Retirer IP source</option>
    <option value="list-all">Lister toutes les règles</option><option value="list-all-zones">Lister toutes les zones</option>
    <option value="reload">Reload (appliquer permanent)</option><option value="runtime-to-permanent">Sauvegarder runtime → permanent</option>
    <option value="state">Vérifier état firewalld</option>
  </select></div>
  <div class="form-row"><label>Service (ex: http, ssh, https)</label><input class="input" id="fw-svc" placeholder="http" oninput="bfw()"></div>
  <div class="form-row"><label>Port/protocole (ex: 8080/tcp)</label><input class="input" id="fw-port" placeholder="8080/tcp" oninput="bfw()"></div>
  <div class="form-row"><label>Source IP/réseau</label><input class="input" id="fw-src" placeholder="192.168.1.0/24" oninput="bfw()"></div>
  <div class="form-row"><label>Zone</label><select class="select" id="fw-zone" onchange="bfw()"><option value="public">public</option><option value="trusted">trusted</option><option value="internal">internal</option><option value="dmz">dmz</option><option value="home">home</option><option value="work">work</option></select></div>
</div>
<div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:.5rem">
  <label class="check-row"><input type="checkbox" id="fw-perm" checked onchange="bfw()"> --permanent</label>
  <label class="check-row"><input type="checkbox" id="fw-now" checked onchange="bfw()"> --immediate (immédiat)</label>
</div>`,
};

// Render bricks
const bricksDiv=document.getElementById('bricks');
const panelsDiv=document.getElementById('panels');
let activeBrick=null;

BRICKS.forEach(b=>{
  const btn=document.createElement('button');
  btn.className='brick'; btn.textContent=b.label; btn.id='brick-'+b.id;
  btn.onclick=()=>activateBrick(b.id);
  bricksDiv.appendChild(btn);
  const panel=document.createElement('div');
  panel.className='brick-panel'; panel.id='panel-'+b.id;
  panel.innerHTML=PANELS[b.id]||'';
  panelsDiv.appendChild(panel);
});

function activateBrick(id){
  document.querySelectorAll('.brick').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.brick-panel').forEach(p=>p.classList.remove('active'));
  if(activeBrick===id){ activeBrick=null; document.getElementById('build-output').style.display='none'; return; }
  activeBrick=id;
  document.getElementById('brick-'+id).classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
  document.getElementById('build-output').style.display='block';
  const fn={'find':bfind,'grep':bgrep,'sed':bsed,'awk':bawk,'tar':btar,'rsync':brsync,'systemctl':bsystemctl,'journalctl':bjournalctl,'dnf':bdnf,'rpm':brpm,'ss':bss,'chmod':bchmod,'useradd':buseradd,'firewall':bfw};
  (fn[id]||function(){})();
}

function setCmd(cmd){ document.getElementById('cmd-out').textContent=cmd; }
function copyBuild(){ navigator.clipboard.writeText(document.getElementById('cmd-out').textContent); const t=document.getElementById('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); }
function gv(id){ const e=document.getElementById(id); return e?e.value.trim():''; }
function gc(id){ const e=document.getElementById(id); return e?e.checked:false; }

function bfind(){
  let c='find '+( gv('f-path')||'.' );
  if(gv('f-type')) c+=` -type ${gv('f-type')}`;
  if(gv('f-name')) c+=` -name "${gv('f-name')}"`;
  if(gv('f-size')) c+=` -size ${gv('f-size')}`;
  if(gv('f-mtime')) c+=` -mtime ${gv('f-mtime')}`;
  if(gv('f-depth')) c+=` -maxdepth ${gv('f-depth')}`;
  if(gv('f-user')) c+=` -user ${gv('f-user')}`;
  if(gv('f-perm')) c+=` -perm ${gv('f-perm')}`;
  const a=gv('f-action');
  if(a==='delete') c+=' -delete';
  else if(a==='print0') c+=' -print0 | xargs -0 ls -la';
  else if(a==='chmod644') c+=' -exec chmod 644 {} \\;';
  else if(a==='ls') c+=' -exec ls -la {} \\;';
  else if(a==='grep') c+=' -exec grep -l "pattern" {} \\;';
  setCmd(c);
}

function bgrep(){
  const pat=gv('g-pat'); const file=gv('g-file')||'.';
  let flags='';
  if(gc('g-r')) flags+='r'; if(gc('g-i')) flags+='i'; if(gc('g-n')) flags+='n';
  if(gc('g-v')) flags+='v'; if(gc('g-l')) flags+='l'; if(gc('g-c')) flags+='c';
  if(gc('g-w')) flags+='w'; if(gc('g-E')) flags+='E'; if(gc('g-P')) flags+='P';
  let c='grep'+(flags?' -'+flags:'')+` "${pat}" ${file}`;
  const B=gv('g-B'); const A=gv('g-A');
  if(B&&B!=='0') c=c.replace('grep','grep -B '+B);
  if(A&&A!=='0') c+=` -A ${A}`;
  setCmd(c);
}

function bsed(){
  const action=gv('s-action'), file=gv('s-file')||'fichier.txt';
  const inplace=gc('s-i'), bak=gc('s-bak'), g=gc('s-g');
  const iopt=inplace?(bak?'-i.bak':'-i ')+' ':' ';
  let c='sed ';
  if(action==='replace'){ const f=gv('s-from'), t=gv('s-to'); c+=`${inplace?(bak?'-i.bak ':'-i '):''}\'s/${f}/${t}/${g?'g':''}\'`; }
  else if(action==='delete'){ const pat=gv('s-from'); c+=`${inplace?(bak?'-i.bak ':'-i '):''}\'/${pat}/d\'`; }
  else if(action==='deleteblank'){ c+=`${inplace?(bak?'-i.bak ':'-i '):''}'/^$/d'`; }
  else if(action==='deletecomment'){ c+=`${inplace?(bak?'-i.bak ':'-i '):''}'/^#/d'`; }
  else if(action==='print'){ const l=gv('s-lines')||'1,10'; c+=`-n '${l}p'`; }
  else if(action==='insert'){ const pat=gv('s-from'), ins=gv('s-insert'); c+=`${inplace?(bak?'-i.bak ':'-i '):''}\'/${pat}/a ${ins}\'`; }
  else if(action==='prepend'){ const pat=gv('s-from'), ins=gv('s-insert'); c+=`${inplace?(bak?'-i.bak ':'-i '):''}\'/${pat}/i ${ins}\'`; }
  setCmd(c+' '+file);
}

function bawk(){
  const file=gv('a-file')||'fichier', fs=gv('a-fs'), pat=gv('a-pat'), action=gv('a-action'), fields=gv('a-fields')||'$1';
  let body;
  if(action==='print') body=`{print ${fields}}`;
  else if(action==='sum') body=`{sum+=${fields}} END{print sum}`;
  else if(action==='count') body='END{print NR}';
  else if(action==='countval') body=`{c[${fields}]++} END{for(k in c) print c[k],k}`;
  else if(action==='max') body=`BEGIN{m=""} {if($${fields}>m) m=$${fields}} END{print m}`;
  else body=gv('a-custom')||`{print ${fields}}`;
  let c='awk';
  if(fs) c+=` -F'${fs}'`;
  c+=` '${pat?pat+' ':''}${body}' ${file}`;
  setCmd(c);
}

function btar(){
  const op=gv('t-op'), arch=gv('t-arch')||'archive.tar.gz', src=gv('t-src')||'dossier/', comp=gv('t-comp'), dest=gv('t-dest'), excl=gv('t-excl'), v=gc('t-v');
  let flags='-'+op+(v?'v':'')+comp+'f';
  let c=`tar ${flags} ${arch}`;
  if(excl) c+=` --exclude="${excl}"`;
  if(op==='x'&&dest) c+=` -C ${dest}`;
  if(op!=='t') c+=` ${src}`;
  setCmd(c);
}

function brsync(){
  let src=gv('r-src')||'source/'; let dst=gv('r-dst')||'dest/';
  const host=gv('r-host'), port=gv('r-port'), excl=gv('r-excl'), bw=gv('r-bw');
  let c='rsync -av';
  if(gc('r-z')) c+='z';
  if(gc('r-n')) c+='n';
  if(gc('r-del')) c+=' --delete';
  if(gc('r-prog')) c+=' --progress';
  if(gc('r-chk')) c+=' --checksum';
  if(gc('r-bkp')) c+=` --backup --backup-dir=/backup/$(date +%F)`;
  if(port&&port!=='22') c+=` -e "ssh -p ${port}"`;
  else if(host) c+=' ';
  if(excl) c+=` --exclude="${excl}"`;
  if(bw&&bw!=='0') c+=` --bwlimit=${bw}`;
  c+=` ${src} ${host?host+':':''}${dst}`;
  setCmd(c);
}

function bsystemctl(){
  const svc=gv('sc-svc')||'httpd', action=gv('sc-action')||'status';
  if(action.startsWith('list')||action==='daemon-reload') setCmd(`systemctl ${action} --no-pager`);
  else setCmd(`systemctl ${action} ${svc}`);
}

function bjournalctl(){
  let c='journalctl';
  const svc=gv('j-svc'); if(svc) c+=` -u ${svc}`;
  if(gc('j-f')) c+=' -f';
  if(gc('j-b')) c+=' -b';
  if(gc('j-k')) c+=' -k';
  if(gc('j-r')) c+=' -r';
  const p=gv('j-p'); if(p) c+=` -p ${p}`;
  const n=gv('j-n'); if(n) c+=` -n ${n}`;
  const since=gv('j-since'); if(since) c+=` --since "${since}"`;
  const until=gv('j-until'); if(until) c+=` --until "${until}"`;
  if(gc('j-np')) c+=' --no-pager';
  setCmd(c);
}

function bdnf(){
  const mgr=gv('d-mgr')||'dnf', action=gv('d-action')||'install', pkg=gv('d-pkg'), y=gc('d-y');
  const noarg=['update','upgrade','check-update','history','clean all','repolist enabled','group list'];
  let c=`${mgr}${y?' -y':''} ${action}`;
  if(!noarg.includes(action)&&pkg) c+=` ${pkg}`;
  setCmd(c);
}

function brpm(){
  const action=gv('rpm-action')||'-q', pkg=gv('rpm-pkg'), grep=gv('rpm-grep');
  let c='rpm '+action;
  if(action!=='-qa'&&action!=='-Va'&&pkg) c+=` ${pkg}`;
  if(grep) c+=` | grep -i "${grep}"`;
  setCmd(c);
}

function bss(){
  const tool=gv('n-tool');
  document.getElementById('ss-opts').style.display=tool==='ss'?'':'none';
  document.getElementById('ip-opts').style.display=tool==='ip'?'':'none';
  document.getElementById('nm-opts').style.display=tool==='nmcli'?'':'none';
  if(tool==='ss'){
    const opt=gv('n-ssopt')||'tlnp'; const port=gv('n-port');
    let c=`ss -${opt}`;
    if(port) c+=` sport = :${port}`;
    setCmd(c);
  } else if(tool==='ip'){
    setCmd(`ip ${gv('n-ipopt')||'addr show'}`);
  } else {
    setCmd(`nmcli ${gv('n-nmopt')||'device status'}`);
  }
}

function bchmod(){
  const target=gv('c-target')||'/opt/app', action=gv('c-action'), perms=gv('c-perms'), owner=gv('c-owner'), r=gc('c-r');
  const R=r?' -R':'';
  if(action==='chmod') setCmd(`chmod${R} ${perms} ${target}`);
  else if(action==='chown') setCmd(`chown${R} ${owner} ${target}`);
  else setCmd(`chmod${R} ${perms} ${target}\nchown${R} ${owner} ${target}`);
}

function buseradd(){
  const name=gv('u-name')||'appuser', action=gv('u-action'), shell=gv('u-shell'), grps=gv('u-groups'), home=gv('u-home');
  if(action==='add'){
    let c='useradd';
    if(gc('u-m')) c+=' -m';
    if(gc('u-sys')) c+=' -r';
    if(shell) c+=` -s ${shell}`;
    if(home) c+=` -d ${home}`;
    if(grps) c+=` -G ${grps}`;
    setCmd(c+' '+name);
  } else if(action==='mod'){
    let c='usermod';
    if(shell) c+=` -s ${shell}`;
    if(grps) c+=` -aG ${grps}`;
    if(home) c+=` -d ${home}`;
    setCmd(c+' '+name);
  } else if(action==='del'){
    setCmd('userdel'+(gc('u-del-r')?' -r':'')+' '+name);
  } else if(action==='passwd') setCmd(`passwd ${name}`);
  else if(action==='lock') setCmd(`passwd -l ${name}`);
  else if(action==='unlock') setCmd(`passwd -u ${name}`);
  else if(action==='id') setCmd(`id ${name}`);
  else if(action==='groups') setCmd(`groups ${name}`);
  else if(action==='getent') setCmd(`getent passwd ${name}`);
}

function bfw(){
  const action=gv('fw-action'), svc=gv('fw-svc'), port=gv('fw-port'), src=gv('fw-src'), zone=gv('fw-zone')||'public';
  const perm=gc('fw-perm'), now=gc('fw-now');
  const noarg=['list-all','list-all-zones','reload','runtime-to-permanent','state'];
  if(noarg.includes(action)){ setCmd('firewall-cmd --'+action); return; }
  let c=`firewall-cmd --zone=${zone}`;
  if(action==='add-service'||action==='remove-service') c+=` --${action}=${svc||'http'}`;
  else if(action==='add-port'||action==='remove-port') c+=` --${action}=${port||'8080/tcp'}`;
  else if(action==='add-source'||action==='remove-source') c+=` --${action}=${src||'192.168.1.0/24'}`;
  if(perm) c+=' --permanent';
  if(now&&perm) c+=' --immediate';
  setCmd(c);
}
